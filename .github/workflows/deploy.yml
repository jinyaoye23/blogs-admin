name: Deploy to Alibaba Cloud ECS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build and deploy Docker container
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Build Docker image
        run: docker build -t my-blog-admin:${{ github.sha }} .

      - name: Save Docker image to tar
        run: docker save my-blog-admin:${{ github.sha }} -o my-blog-admin.tar

      - name: Copy Docker image to remote server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}
          port: 22
          source: "my-blog-admin.tar"
          target: "~/"

      - name: Load image and restart container on remote server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}
          port: 22
          script: |
            docker load -i ~/my-blog-admin.tar
            docker rm -f my-blog-admin || true
            docker run -d \
              --name my-blog-admin \
              --restart always \
              -p 3000:3000 \
              -e NODE_ENV=production \
              -e PORT=3000 \
              -e HOST=0.0.0.0 \
              my-blog-admin:${{ github.sha }}
            rm -f ~/my-blog-admin.tar
